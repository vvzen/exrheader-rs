name: Create Release

on:
  pull_request:
  push:
    branches: [ "main" ] # FIXME: Remove after I'm done testing!
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: exrheader-rs-binary

jobs:
  # Ensure tests pass, etc
  run_checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: cargo test --verbose
    - name: Run clippy
      run: cargo clippy

  upload_binary:
    needs:
      - run_checks

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build binary for linux x86
      run: cargo build --release --verbose
    - name: Rename Binary
      run: |
        mkdir -p dist
        cp target/release/exrheader-rs dist/exrheader-rs-linux-x86
    - name: Upload artifact 
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BINARY_NAME }}-${{ github.sha }}
        path: dist/exrheader-rs-linux-x86

  release:
    needs:
      - upload_binary

    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Fetch binary artifact
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ env.BINARY_NAME }}-${{ github.sha }}
          path: dist
          merge-multiple: true

      # Create a new release
      # Docs: https://cli.github.com/manual/gh_release_create
      - name: Create GitHub Release
        run: |
          tag=$(git describe --tags $(git rev-list --tags --max-count=1))
          gh release create $tag --generate-notes ./dist/* --fail-on-no-commits
